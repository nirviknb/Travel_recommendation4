<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — Wanderlust</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" /></noscript>
  <link rel="stylesheet" href="auth.css"/>
  <link rel="stylesheet" href="travel_recommendation.css"/>
  <style>
    .profile-page {
      padding: 7rem 2rem 4rem;
      min-height: 100dvh;
      background: var(--cream);
    }
    .profile-container {
      max-width: 640px;
      margin: 0 auto;
    }
    .profile-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 32px rgba(26,22,18,0.08), 0 1px 3px rgba(26,22,18,0.06), 0 0 0 1px rgba(26,22,18,0.04);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.8s ease both;
    }
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--warm), var(--gold));
      opacity: 0.7;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--warm));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--white);
    }
    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      text-align: center;
      color: var(--ink);
      margin-bottom: 0.25rem;
    }
    .profile-email {
      text-align: center;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(26,22,18,0.1);
    }
    .profile-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
    }
    .profile-detail-label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .profile-detail-value {
      font-size: 0.9rem;
      color: var(--ink);
      font-weight: 500;
    }
    .profile-actions {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }
    .profile-btn {
      flex: 1;
      padding: 0.9rem 1.5rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }
    .profile-btn-primary {
      background: var(--gold);
      color: var(--ink);
      border: none;
    }
    .profile-btn-primary:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(201,168,76,0.3);
    }
    .profile-btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid rgba(26,22,18,0.2);
    }
    .profile-btn-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    @media (max-width: 640px) {
      .profile-page { padding: 5rem 1rem 3rem; }
      .profile-card { padding: 1.5rem; }
      .profile-name { font-size: 1.5rem; }
      .profile-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="profile-page">
    <div class="profile-container">
      <a href="travel_recommendation.html" class="auth-back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Wanderlust
      </a>

      <div class="profile-card">
        <div class="profile-avatar" id="profileAvatar"></div>
        <h1 class="profile-name" id="profileName"></h1>
        <p class="profile-email" id="profileEmail"></p>

        <div class="profile-details">
          <div class="profile-detail">
            <span class="profile-detail-label">Account Type</span>
            <span class="profile-detail-value" id="profileProvider"></span>
          </div>
          <div class="profile-detail">
            <span class="profile-detail-label">Member Since</span>
            <span class="profile-detail-value" id="profileJoined"></span>
          </div>
        </div>

        <div class="profile-actions">
          <a href="bookings.html" class="profile-btn profile-btn-primary">View My Bookings</a>
          <button class="profile-btn profile-btn-secondary" id="profileLogout">Sign Out</button>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    (function() {
      var user = requireAuth();
      if (!user) return;

      document.getElementById('profileName').textContent = user.name || 'Traveler';
      document.getElementById('profileEmail').textContent = user.email || '';
      document.getElementById('profileProvider').textContent = user.provider === 'google' ? 'Google' : 'Email';

      var initials = (user.name || 'T').split(' ').map(function(n) { return n[0]; }).join('').toUpperCase().slice(0, 2);
      document.getElementById('profileAvatar').textContent = initials;

      var authTime = localStorage.getItem('wanderlust_auth_time');
      if (authTime) {
        var date = new Date(parseInt(authTime));
        document.getElementById('profileJoined').textContent = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      document.getElementById('profileLogout').addEventListener('click', function() {
        handleLogout();
      });
    })();
  </script>
</body>
</html>
