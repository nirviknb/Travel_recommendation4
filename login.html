<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wanderlust — Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" /></noscript>
  <link rel="stylesheet" href="auth.css"/>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="auth-page">
    <div class="auth-background">
      <div class="auth-bg-overlay"></div>
      <div class="auth-bg-text">
        <span>✦</span>
      </div>
    </div>

    <div class="auth-container">
      <a href="travel_recommendation.html" class="auth-back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Wanderlust
      </a>

      <div class="auth-card">
        <div class="auth-brand">
          <span class="auth-brand-icon">✦</span>
          <span class="auth-brand-name">Wanderlust</span>
        </div>

        <div class="auth-header">
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to access your saved destinations and bookings</p>
        </div>

        <div id="g_id_onload"
             data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleSignIn"
             data-auto_prompt="false">
        </div>

        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             data-width="100%">
        </div>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <form id="loginForm" class="auth-form" novalidate>
          <div class="form-group">
            <label for="email" class="form-label">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
            <span class="field-error" id="emailError">Please enter a valid email address</span>
          </div>

          <div class="form-group">
            <div class="form-label-row">
              <label for="password" class="form-label">Password</label>
              <a href="#" class="form-forgot-link">Forgot password?</a>
            </div>
            <div class="password-input-wrap">
              <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password" />
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">
                <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <span class="field-error" id="passwordError">Password is required</span>
          </div>

          <div class="form-remember">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-text">Remember me for 30 days</span>
            </label>
          </div>

          <button type="submit" class="auth-submit-btn" id="loginSubmitBtn">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" style="display:none">
              <svg class="spinner" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg>
            </span>
          </button>

          <div class="auth-message" id="loginMessage"></div>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="signup.html" class="auth-footer-link">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
